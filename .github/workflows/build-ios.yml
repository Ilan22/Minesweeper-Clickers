name: Build iOS

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Install Godot
      # -------------------------
      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_macos.universal.zip
          unzip Godot_v4.3-stable_macos.universal.zip -d godot

          sudo mv godot/Godot.app /Applications/Godot.app

          sudo ln -s /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

      # -------------------------
      # Install export templates
      # -------------------------
      - name: Install export templates
        run: |
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.3.stable

          wget https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz

          unzip Godot_v4.3-stable_export_templates.tpz -d templates

          mv templates/templates/* ~/Library/Application\ Support/Godot/export_templates/4.3.stable/

      # -------------------------
      # Export Xcode project
      # -------------------------
      - name: Export iOS project
        run: |
          mkdir -p build/ios

          godot --headless --path . --export-release "iOS" build/ios/MinesweepPixel.xcodeproj

      # -------------------------
      # Find Xcode project
      # -------------------------
      - name: Locate project
        id: locate
        run: |
          PROJECT=$(find build/ios -name "*.xcodeproj" | head -1)

          echo "PROJECT=$PROJECT" >> $GITHUB_ENV

          SCHEME=$(basename "$PROJECT" .xcodeproj)

          echo "SCHEME=$SCHEME" >> $GITHUB_ENV

      # -------------------------
      # Build app
      # -------------------------
      - name: Build .app
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build

      # -------------------------
      # Locate .app
      # -------------------------
      - name: Find app
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -1)

          echo "APP=$APP" >> $GITHUB_ENV

          echo "Found app:"
          echo $APP

      # -------------------------
      # Create IPA structure
      # -------------------------
      - name: Create IPA
        run: |
          mkdir Payload

          cp -R "$APP" Payload/

          zip -r App.ipa Payload

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: App.ipa
